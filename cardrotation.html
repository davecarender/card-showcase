<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nox Mortua Card Viewer</title>
    <link rel="icon" href="./assets/images/vampire-favicon.png" type="image/png">
    <link rel="stylesheet" href="./assets/css/styles.css">
    <meta name="description" content="Nox Mortua card viewer">

    <style>
    html,body{height:100%;overflow-y:hidden}
    .solo-stage{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:transparent}
    .solo-card-wrapper{width:var(--card-w);max-width:460px}
    .solo-card-wrapper .card{width:100%;height:auto}
    .solo-card-wrapper .card-inner{height:calc(var(--card-h) * 0.9)}
    .solo-card-wrapper .card-face{background-size:contain;background-position:center;background-repeat:no-repeat;height:100%}
    </style>
    <style>
    .site-label{font-family:serif;display:block;text-align:center;color:var(--muted-text,#ddd);margin-top:18px;font-size:14px;letter-spacing:0.06em}
    </style>
    <style>
    .koz-card:not(.initializing):hover{transform:none !important}
    .koz-card .card-tilt{transform:none !important}
    </style>
    <style>
    body.cardrotation{background-image:url('./assets/images/cardRotateBackground.png');background-size:cover;background-position:center center;background-repeat:no-repeat}
    .solo-stage{position:relative;z-index:1;background:transparent}
    </style>
</head>

<body class="cardrotation">
    <main class="solo-stage">
        <div class="solo-card-wrapper">
            <div class="card koz-card" id="koz-card" tabindex="0" role="button" aria-label="Kozilek proxy card">
                <div class="card-tilt">
                    <div class="card-inner">
                        <!-- // place card front image here --> <div class="card-face card-front" style="background-image:url('./assets/images/rotate_front.png')"></div>
                        <!-- // place card back image here --> <div class="card-face card-back" style="background-image:url('./assets/images/rotate_back.png')"></div>
                    </div>
                </div>
            </div>
        </div>
        <br>
        <br>
        <div class="site-label">www. N O X M O R T U A .com</div>
    </main>

    <script>
    // Page-local flip loop: continuously flip the card back and forth
    (function(){
    const FLIP_INTERVAL = 3000; // ms between flips (tweakable)
        const START_DELAY = 220; // initial delay before first flip
        let intervalId = null;

        function toggleFlip(card){
            if(!card) return;
            const nowFlipped = card.classList.toggle('is-flipped');
            card.setAttribute('aria-pressed', nowFlipped ? 'true' : 'false');
        }

        function startLoop(card){
            if(!card) return;
            // ensure any previous loop is cleared
            if(intervalId) clearInterval(intervalId);
            // do first flip immediately after short delay, then continue on interval
            setTimeout(()=>{
                toggleFlip(card);
                intervalId = setInterval(()=> toggleFlip(card), FLIP_INTERVAL);
            }, START_DELAY);
        }

        function stopLoop(){ if(intervalId){ clearInterval(intervalId); intervalId = null; } }

        window.addEventListener('load', ()=>{
            const card = document.querySelector('.koz-card');
            if(!card) return;
            startLoop(card);

            // Pause flipping when the page is hidden to save CPU and avoid unexpected flips
            document.addEventListener('visibilitychange', ()=>{
                if(document.hidden) stopLoop(); else startLoop(card);
            });
        });
    })();
    </script>
</body>
</html>
